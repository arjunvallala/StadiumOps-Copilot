name: StadiumOps Copilot CI Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit, Integration Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: |
          npm run setup

      - name: Execute Linter Rules
        run: |
          npm run lint

      - name: Execute Test Suite
        run: |
          npm run test

      - name: Generate Backend Coverage Report
        run: |
          npm run coverage --prefix backend
